name: Sync Labels

on:
  push:
    branches: [main]
    paths:
      - ".github/labels.yml"
      - ".github/scripts/sync-labels.sh"
      - ".github/workflows/labels.yml"
  pull_request:
    branches: [main]
    paths:
      - ".github/labels.yml"
      - ".github/scripts/sync-labels.sh"
      - ".github/workflows/labels.yml"
  workflow_dispatch:

permissions: {}

# Serialize runs so concurrent label mutations cannot race; the newest queued run wins
concurrency:
  group: ${{ github.workflow }}

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Sync labels
        env:
          GH_TOKEN: ${{ github.token }}
          DRY_RUN: ${{ github.event_name == 'pull_request' && '1' || '0' }}
        run: bash .github/scripts/sync-labels.sh .github/labels.yml
