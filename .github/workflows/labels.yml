name: Sync Labels

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Preview changes without applying them"
        type: boolean
        default: false

permissions: {}

# Serialize manual runs so concurrent label mutations cannot race
concurrency:
  group: ${{ github.workflow }}

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Sync labels
        env:
          GH_TOKEN: ${{ github.token }}
          DRY_RUN: ${{ inputs.dry_run && '1' || '0' }}
        run: bash .github/scripts/sync-labels.sh .github/labels.yml
