# Optional override: mount host SSH and GitHub CLI credentials into the Claude Code container.
#
# Usage:
#   scripts/claude-start.sh -f compose.claude.auth.yml up -d
#
# Mounts:
#   - ~/.ssh        → /home/claude/.ssh        (read-only) — git push/pull via SSH
#   - ~/.config/gh  → /home/claude/.config/gh  (read-only) — GitHub CLI (gh) authentication
#
# Both host paths must already exist. Strict firewall mode allows outbound port 22 (SSH)
# and HTTPS to GitHub, so both methods work without switching to open mode.
services:
  claude:
    volumes:
      - type: bind
        source: ${HOME}/.ssh
        target: /home/claude/.ssh
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ${HOME}/.config/gh
        target: /home/claude/.config/gh
        read_only: true
        bind:
          create_host_path: false
